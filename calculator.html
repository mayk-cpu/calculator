<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Калькулятор</title> 
        <style>
body {
    background-color: #ececec;

    display: flex;
    flex-direction: column;

    justify-content: center;
    align-items: center;
    
    gap: 20px;

    height: 100vh;

    font-family: Arial, sans-serif;

    
}
.calculator {
        background-color: white;

        padding: 20px;

        border-radius: 15px;

        width: 300px;

        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    #display {
        width: 100%;
        height: 60px;
        font-size: 28px;
        text-align: right;
        margin-bottom: 15px;
        border: 1px solid gray;
        border-radius: 10px;
        padding-right: 10px;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        height: 60px;
        border: none;
        border-radius: 10px;
        font-size: 22px;
        cursor: pointer;
        background-color: #f0f0f0;
        transition: 0.2s;
    }
    button:hover {
        background-color: #dcdcdc;
        transform: scale(1.05);
    }
    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    .operator{
        background-color: orange;
        color: white;
    }
    .equal {
        background-color: green;
        color: white;
    }
    .clear {
        background-color: red;
        color: white;
    }
    button:active {
        transform: scale(0.95);
    }
    .zero {
        grid-column: span 2;
    }
    #history {
        margin-top: 20px;
        background-color: white;
        padding: 15px;
        border-radius: 10px;
        width: 300px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        max-height: 200px;
        overflow-y: auto;
    }
    .dark {
        background-color: #1e1e1e;
    }
    .dark .calculator {
        background-color: #2c2c2c;
        color: white;
    }
    .dark #display {
        background-color: #444;
        color: white;
        border: 1px solid #666;
    }
    .dark #history {
        background-color: #2c2c2c;
        color: white;
    }
    .error {
        animation: shake 0.3s;
        background-color: #ffb3b3 !important;
    }
    @keyframes shake {
        0% {transform: translateX(0); }
        25% {transform: translateX(-5px); }
        50% {transform: translateX(5px); }
        75% {transform: translateX(-5px); }
        100% {transform: translateX(0); }
    }
    @media (max-width: 500px) {
        .calculator,
        #history {
            width: 90%;
        }

        button {
            height: 55px;
            font-size: 20px;
        }

        #display {
            font-size: 24px;
        }
    }
    </style>
    </head>
    <body> 
        <div class="calculator">
            <input type="text" id="display" readonly>
      <div class="buttons"> 

    <button onclick="clearDisplay()" class="clear">C</button>
    <button onclick="deleteLast()">←</button>
    <button class="operator" onclick="addNumber('/')">/</button>
    <button class="operator" onclick="addNumber('*')">*</button>
    <button class="operator" onclick="percent()">%</button>

    <button onclick="addNumber('7')">7</button>
    <button onclick="addNumber('8')">8</button>
    <button onclick="addNumber('9')">9</button>
    <button class="operator" onclick="addNumber('-')">-</button>

    <button onclick="addNumber('4')">4</button>
    <button onclick="addNumber('5')">5</button>
    <button onclick="addNumber('6')">6</button>
    <button class="operator" onclick="addNumber('+')">+</button>

    <button onclick="addNumber('1')">1</button>
    <button onclick="addNumber('2')">2</button>
    <button onclick="addNumber('3')">3</button>
    <button class="operator" onclick="changeSign()">±</button>

    <button class="zero" onclick="addNumber('0')">0</button>
    <button onclick="addNumber('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
    

</div>
        </div>
        <div id="history">
            <h3>История</h3>
        </div> 
        
        <button onclick="clearHistory()">Очистить историю</button>
        <button onclick="toggleTheme()">Ночная тема</button>
        <script>
            let clickSound = new Audio("click.mp3");
            function toggleTheme() {
                document.body.classList.toggle("dark");

                if (document.body.classList.contains("dark")){
                    localStorage.setItem("theme", "dark");
                } else {
                    localStorage.setItem("theme", "light");
                }
            }
            function addNumber(number) {
                clickSound.currentTime = 0;
                clickSound.play();
               let display = document.getElementById("display");
               if (display.value.length >= 16) {
                return;
               }
               let lastChar = display.value.slice(-1);

               if (
                display.value === ""
                &&
                (number === "+" || number === "*" || number === "/")
               )
               {
                return;
               }

               if (
                (number === "+" || number === "-" || number === "*" || number === "/")
                &&
                (lastChar === "+" || lastChar === "-" || lastChar === "*" || lastChar === "/")
               ) {
                return;
               }
               if (number === ".") {
                let parts = display.value.split(/[\+\-\*\/]/);
                let lastPart = parts[parts.length - 1];

                if (lastPart.includes(".")) {
                    return;
                }
               }
               display.value += number;
            }
            function calculate () {
                try {
                     let expression = document.getElementById("display").value;
                     let result = eval(expression);
                     document.getElementById("display").value = result;
                     let historyItem = document.createElement ("p");
                     historyItem.innerText = expression + " = " + result;
                     document.getElementById("history").appendChild(historyItem);
                     localStorage.setItem("history", document.getElementById("history").innerHTML);
                     
                } catch {
                    let display = document.getElementById("display");
                        display.value = "Ошибка";
                        display.classList.add("error");
                        setTimeout(() => {
                            display.classList.remove("error");
                        }, 300);
                }               
            }
            function percent () {
                    let display = document.getElementById("display");
                    try {
                        display.value = eval(display.value) / 100;
                    } catch {
                        let display = document.getElementById("display");
                        display.value = "Ошибка";
                        display.classList.add("error");
                        setTimeout(() => {
                            display.classList.remove("error");
                        }, 300);
                    }
                }
            function clearDisplay () {
                document.getElementById ("display").value = "";
            }      
            function clearHistory () {
                document.getElementById("history").innerHTML = "<h3>История</h3>";

                 localStorage.removeItem("history");
            }  
            function deleteLast (){
                let current = document.getElementById ("display").value;
                document.getElementById ("display").value = current.slice(0,-1);
            }
            document.addEventListener("keydown", function(event) {
                if (!isNaN(event.key) || event.key ==="+" || event.key === "-" || event.key === "*" || event.key ===  "/" || event.key === ".") {
                    addNumber(event.key);
                }
                if (event.key === "Enter") {
                    calculate();
            }
            if (event.key === "Backspace") {
                deleteLast();
            }
            if (event.key === "Escape") {
                clearDisplay ();
            }
        });
        let savedHistory = localStorage.getItem("history");
        
        if (savedHistory) {
            document.getElementById("history").innerHTML = savedHistory;
        }
        let savedTheme = localStorage.getItem("theme");

        if (savedTheme === "dark") {
            document.body.classList.add("dark");
        }
        function changeSign() {
            let display = document.getElementById("display");

            if (display.value !== "") {
                display.value = Number(display.value) * -1;
            }
        }
            </script>
    </body>
</html>
